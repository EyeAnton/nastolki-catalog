<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boardex.am</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1e1f22;--surface:#2b2d31;--card:#313338;--card-h:#383a40;
  --brd:#3f4147;--brd2:#4e5058;--txt:#dbdee1;--muted:#949ba4;--dim:#5c5f66;
  --acc:#5865f2;--acc-h:#4752c4;--acc-dim:rgba(88,101,242,.15);
  --grn:#23a55a;--grn-dim:rgba(35,165,90,.15);--ylw:#f0b232;
  --grad:linear-gradient(135deg,#5865f2,#7b4ff0 50%,#eb459e);
  --r:8px;--rl:12px;
}
body{background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;min-height:100vh;font-size:14px}
.hdr{background:var(--surface);border-bottom:1px solid var(--brd);padding:0 20px;height:56px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:30}
.logo{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.hdiv{width:1px;height:24px;background:var(--brd)}
.hsub{font-size:12px;color:var(--muted);flex:1}
.lsw{display:flex;gap:2px;background:var(--bg);border-radius:6px;padding:2px;border:1px solid var(--brd)}
.lb{padding:4px 10px;border-radius:4px;border:none;background:transparent;color:var(--muted);font-size:12px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s}
.lb.active{background:var(--acc);color:#fff;font-weight:600}
.lb:hover:not(.active){background:var(--brd);color:var(--txt)}
.ctrl{background:var(--surface);border-bottom:1px solid var(--brd);padding:10px 20px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;position:sticky;top:56px;z-index:20}
.sw{flex:1;min-width:200px;position:relative}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
input.si{width:100%;padding:8px 10px 8px 34px;background:var(--bg);border:1px solid var(--brd);border-radius:var(--r);color:var(--txt);font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border .15s}
input.si:focus{border-color:var(--acc)}
input.si::placeholder{color:var(--muted)}
.fg{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.fl{font-size:11px;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.chip{padding:5px 11px;border-radius:20px;border:1px solid var(--brd);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;white-space:nowrap}
.chip.active{background:var(--acc-dim);border-color:var(--acc);color:#c9cdfb;font-weight:500}
.chip:hover:not(.active){border-color:var(--brd2);color:var(--txt)}
.ssel{padding:7px 10px;background:var(--bg);border:1px solid var(--brd);border-radius:var(--r);color:var(--txt);font-size:12px;font-family:'Inter',sans-serif;outline:none;cursor:pointer}
.cnt{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--acc-dim);color:#c9cdfb;padding:4px 10px;border-radius:20px;white-space:nowrap;border:1px solid rgba(88,101,242,.3);margin-left:auto}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:12px 16px}
.card{background:var(--card);border:1px solid var(--brd);border-radius:var(--rl);overflow:hidden;display:flex;flex-direction:column;transition:transform .12s,border-color .15s,background .15s}
.card:hover{transform:translateY(-2px);border-color:var(--brd2);background:var(--card-h)}
.cov{position:relative;aspect-ratio:1/1;background:var(--bg);overflow:hidden;flex-shrink:0}
.cov-em{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:36px;background:linear-gradient(135deg,var(--surface),var(--bg))}
.cov-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .4s}
.cov-img.ok{opacity:1}
.cov-grad{position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(transparent,rgba(30,31,34,.8));pointer-events:none}
.cbadges{position:absolute;top:8px;right:8px;display:flex;gap:5px;align-items:center}
.bgg-b{background:rgba(18,19,21,.8);backdrop-filter:blur(6px);border-radius:5px;padding:3px 7px;font-size:10px;font-weight:700;color:#fcba28;font-family:'JetBrains Mono',monospace;text-decoration:none;border:1px solid rgba(252,186,40,.2);transition:background .15s}
.bgg-b:hover{background:rgba(252,186,40,.15)}
.rat-b{background:rgba(18,19,21,.8);backdrop-filter:blur(6px);border-radius:5px;padding:3px 7px;font-size:10px;font-weight:700;color:var(--ylw);font-family:'JetBrains Mono',monospace;border:1px solid rgba(240,178,50,.2)}
.cbody{padding:12px 14px;display:flex;flex-direction:column;gap:6px;flex:1}
.ctitle{font-size:13px;font-weight:600;color:var(--txt);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.meta-row{display:flex;gap:10px;flex-wrap:wrap}
.mi{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--muted)}
.mi svg{opacity:.6}
.genres{display:flex;gap:4px;flex-wrap:wrap}
.genre{padding:2px 7px;border-radius:4px;font-size:10px;background:var(--bg);color:var(--muted);border:1px solid var(--brd)}
.note-txt{font-size:11px;color:var(--muted);font-style:italic}
.sell-btn{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--acc);cursor:pointer;background:var(--acc-dim);border:1px solid rgba(88,101,242,.25);border-radius:6px;padding:5px 9px;width:fit-content;transition:all .15s;user-select:none;margin-top:2px}
.sell-btn:hover{background:rgba(88,101,242,.25)}
.tg-hint{display:none;font-size:11px;color:var(--muted);background:var(--bg);border:1px solid var(--brd);border-radius:6px;padding:8px 10px;margin-top:4px;line-height:1.5}
.tg-hint a{color:var(--acc);text-decoration:none}
.tg-hint a:hover{text-decoration:underline}
.tg-hint .gn{color:var(--txt);font-weight:600}
.cfoot{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-top:1px solid var(--brd);background:rgba(0,0,0,.1);gap:8px}
.price{font-family:'Inter',sans-serif;font-size:15px;font-weight:700;color:var(--grn)}
.price.unk{font-size:11px;color:var(--dim);font-weight:400;font-style:italic}
.ftags{display:flex;gap:4px;align-items:center}
.ltag{padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600}
.ltag.eng{background:var(--grn-dim);color:#57f287;border:1px solid rgba(87,242,135,.2)}
.ltag.rus{background:var(--acc-dim);color:#c9cdfb;border:1px solid rgba(88,101,242,.2)}
.dtag{font-size:10px;color:var(--dim)}
.empty{display:none;text-align:center;padding:80px 20px;color:var(--muted)}
.pgft{padding:14px 20px;text-align:center;font-size:11px;color:var(--dim);border-top:1px solid var(--brd)}
.pgft a{color:var(--acc);text-decoration:none}

.bgg-onboard{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:#23272a;border:1px solid var(--acc);border-radius:10px;
  padding:12px 18px;font-size:12px;color:var(--txt);z-index:100;
  box-shadow:0 4px 20px rgba(0,0,0,.5);max-width:280px;text-align:center;
  animation:fadein .3s ease}
.bgg-onboard strong{color:#fcba28}
.bgg-onboard button{margin-top:8px;padding:4px 14px;border-radius:6px;
  border:none;background:var(--acc);color:#fff;font-size:11px;cursor:pointer;
  font-family:'Inter',sans-serif}
@keyframes fadein{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>

let lang='ru';
function setLang(l){
  lang=l;
  document.querySelectorAll('.lb').forEach(b=>{
    b.classList.toggle('active',
      (l==='ru'&&b.textContent==='RU')||(l==='en'&&b.textContent==='EN')||(l==='hy'&&b.textContent==='ՀՅ'));
  });
  applyTR();render();
}
function applyTR(){
  const t=TR[lang];
  document.getElementById('h-sub').textContent=t.sub;
  document.getElementById('sq').placeholder=t.si;
  document.getElementById('lbl-l').textContent=t.ll;
  document.getElementById('lbl-pl').textContent=t.lpl;
  document.getElementById('lbl-pr').textContent=t.lpr;
  document.getElementById('fc-la').textContent=t.all;
  document.getElementById('fc-pla').textContent=t.all;
  document.getElementById('fc-s').textContent=t.solo;

  document.getElementById('fc-4p').textContent=t.p4;
  document.getElementById('fc-6p').textContent=t.p6;
  document.getElementById('lbl-d').textContent=t.ld;
  document.getElementById('fc-da').textContent=t.da;
  document.getElementById('fc-dw').textContent=t.dw;
  document.getElementById('fc-dm').textContent=t.dm;
  document.getElementById('fc-dy').textContent=t.dy;
  document.getElementById('fc-pa').textContent=t.pa;
  document.getElementById('fc-p0').textContent=t.p0;
  document.getElementById('fc-p5').textContent=t.p5;
  document.getElementById('fc-p15').textContent=t.p15;
  document.getElementById('fc-p40').textContent=t.p40;
  document.getElementById('so-n').textContent=t.sn;
  document.getElementById('so-c').textContent=t.sc;
  document.getElementById('so-e').textContent=t.se;
  document.getElementById('so-r').textContent=t.sr;
  document.getElementById('so-a').textContent=t.sa;
  document.getElementById('etxt').textContent=t.em;
  document.getElementById('pgft').innerHTML=t.ft;
  // update visible seller buttons
  document.querySelectorAll('.sb-txt').forEach(el=>{
    const hint=el.closest('.sell-btn').nextElementSibling;
    el.textContent=hint&&hint.style.display==='block'?t.sh:t.sb;
  });
}

function dCut(mode){

function filtered(){

    if(df&&x._d<dCut(df))return false;
    if(pf==='0'&&(x.p===null||x.p>=5000))return false;
    if(pf==='5'&&(x.p===null||x.p<5000||x.p>=15000))return false;
    if(pf==='15'&&(x.p===null||x.p<15000||x.p>=40000))return false;
    if(pf==='40'&&(x.p===null||x.p<40000))return false;
    if(plf){const b=BGG[x.t];const mn=b?.min_players,mx=b?.max_players;
      if(plf==='1'&&mn!==1)return false;
      if(plf==='2'&&(mx==null||mx<2||mn>2))return false;
      if(plf==='4'&&(mx==null||mx>4))return false;
      if(plf==='6'&&(mx==null||mx<6))return false;
    }
    return true;
  });
  if(so==='new')r.sort((a,b)=>b._d-a._d);
  else if(so==='cheap')r.sort((a,b)=>(a.p??999999)-(b.p??999999));
  else if(so==='expensive')r.sort((a,b)=>(b.p??-1)-(a.p??-1));
  else if(so==='rating')r.sort((a,b)=>(BGG[b.t]?.rating??0)-(BGG[a.t]?.rating??0));

}

}
function render(){
  const rows=filtered();
  document.getElementById('cnt').textContent=rows.length;
  const g=document.getElementById('grid'),e=document.getElementById('empty');
  if(!rows.length){g.innerHTML='';e.style.display='block';return}
  e.style.display='none';
  g.innerHTML=rows.map(r=>card(r)).join('');
}
applyTR();render();

// BGG first-visit tooltip
(function(){
  if(localStorage.getItem('bgg-tip')) return;
  const d=document.createElement('div');
  d.className='bgg-onboard';
  d.innerHTML='<strong>⭐ Рейтинг BGG</strong> — нажми, чтобы открыть страницу игры на BoardGameGeek<br><button onclick="document.querySelector(\'.bgg-onboard\').remove()">Понятно</button>';
  document.body.appendChild(d);
  localStorage.setItem('bgg-tip','1');
  setTimeout(()=>d.remove(),6000);
})();
</script>
