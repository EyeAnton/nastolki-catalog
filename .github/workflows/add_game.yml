name: Auto-add game listing

on:
  workflow_dispatch:
    inputs:
      title:
        description: 'Game title (exact)'
        required: true
      price:
        description: 'Price in AMD (integer)'
        required: false
      lang:
        description: 'Language: ENG or РУС'
        default: 'ENG'
      msg_id:
        description: 'Telegram message ID'
        required: true
      seller:
        description: 'Seller Telegram username'
        required: false
        default: ''
      note:
        description: 'Seller note / extras'
        required: false
        default: ''
      exchange:
        description: 'Available for exchange? true/false'
        default: 'false'

jobs:
  add-game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install curl_cffi Pillow

      - name: Run auto_add.py
        run: |
          python auto_add.py \
            --title "${{ github.event.inputs.title }}" \
            --price "${{ github.event.inputs.price || '0' }}" \
            --lang "${{ github.event.inputs.lang }}" \
            --msg_id "${{ github.event.inputs.msg_id }}" \
            --seller "${{ github.event.inputs.seller }}" \
            --note "${{ github.event.inputs.note }}" \
            ${{ github.event.inputs.exchange == 'true' && '--exchange' || '' }}

      - name: Commit changes
        run: |
          git config user.name "boardex-bot"
          git config user.email "bot@boardex.am"
          git add index.html covers/
          git diff --staged --quiet || git commit -m "Auto: add/update listing — ${{ github.event.inputs.title }}"
          git push

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Build dist
        run: |
          rm -rf dist && mkdir dist
          cp index.html dist/
          cp -r covers dist/

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          wrangler pages deploy dist/ \
            --project-name nastolki-catalog \
            --branch main \
            --commit-dirty=true
